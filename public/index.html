<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back Stage Pass — Sign In</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background-color: #5a1f8c;
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 18px,
          rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 36px
        ),
        linear-gradient(180deg, #3d0f6b 0%, #6b2a9e 40%, #4a1a7a 100%);
      padding: 24px;
    }

    /* Curtain side panels */
    body::before, body::after {
      content: '';
      position: fixed;
      top: 0; bottom: 0;
      width: 80px;
      background: linear-gradient(to right, #2d0850, rgba(45,8,80,0));
      pointer-events: none;
      z-index: 0;
    }
    body::after { right: 0; background: linear-gradient(to left, #2d0850, rgba(45,8,80,0)); }

    .marquee-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }

    /* Marquee header */
    .marquee {
      background: #1a1a1a;
      border: 3px solid #e85a27;
      border-bottom: none;
      padding: 14px 20px 12px;
      text-align: center;
      position: relative;
    }

    .marquee-lights {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .bulb {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #f5c518;
      box-shadow: 0 0 6px #f5c518;
      animation: flicker 2s ease-in-out infinite;
    }
    .bulb:nth-child(2) { animation-delay: 0.3s; }
    .bulb:nth-child(3) { animation-delay: 0.6s; }
    .bulb:nth-child(4) { animation-delay: 0.9s; }
    .bulb:nth-child(5) { animation-delay: 1.2s; }
    .bulb:nth-child(6) { animation-delay: 1.5s; }
    .bulb:nth-child(7) { animation-delay: 1.8s; }

    @keyframes flicker {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.4; }
    }

    .marquee h1 {
      font-family: 'Bebas Neue', 'Impact', sans-serif;
      font-size: 42px;
      letter-spacing: 4px;
      color: #f5c518;
      text-shadow: 0 0 20px rgba(245,197,24,0.5), 2px 2px 0 #8b4500;
      line-height: 1;
    }

    .marquee p {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e85a27;
      margin-top: 4px;
    }

    /* Main card */
    .card {
      background: #fff;
      border: 3px solid #e85a27;
      border-top: none;
      padding: 32px 36px 36px;
    }

    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 3px;
      color: #5a1f8c;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #f0e8f8;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #fafafa;
      border: 2px solid #ddd;
      border-radius: 4px;
      color: #222;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #5a1f8c;
      box-shadow: 0 0 0 3px rgba(90, 31, 140, 0.12);
      background: #fff;
    }

    .turnstile-wrap {
      margin: 20px 0;
      display: flex;
      justify-content: center;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #e85a27;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 3px 0 #a33a10;
    }

    button[type="submit"]:hover { background: #d44e20; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(1px); box-shadow: none; }

    .error {
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      color: #dc2626;
      margin-bottom: 14px;
      display: none;
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }

    .footer-links a { color: #5a1f8c; text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }

    /* Bottom marquee strip */
    .marquee-bottom {
      background: #1a1a1a;
      border: 3px solid #e85a27;
      border-top: none;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .star { color: #f5c518; font-size: 14px; }

    .marquee-bottom span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: #e85a27;
    }

    .loading { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <div class="marquee-wrap">

    <div class="marquee">
      <div class="marquee-lights">
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div>
      </div>
      <h1>Back Stage Pass</h1>
      <p>Premium Theatrical Streaming</p>
    </div>

    <div class="card">
      <div class="subtitle">Sign in to your account</div>

      <div class="error" id="error-msg">Invalid username or password.</div>

      <form id="login-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>

        <div class="turnstile-wrap">
          <div class="cf-turnstile"
            data-sitekey="0x4AAAAAACgrwTa6egDrMI6e"
            data-theme="light">
          </div>
        </div>

        <button type="submit" id="submit-btn">Enter the Stage</button>
      </form>

      <div class="footer-links">
        <a href="#">Forgot password?</a> &nbsp;·&nbsp; <a href="#">Create account</a>
      </div>
    </div>

    <div class="marquee-bottom">
      <span class="star">★</span>
      <span>Back Stage Pass · BSides SF 2026</span>
      <span class="star">★</span>
    </div>

  </div>

  <script>
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      const form = document.getElementById('login-form');
      err.style.display = 'none';
      btn.textContent = 'Authenticating...';
      form.classList.add('loading');

      const token = document.querySelector('[name="cf-turnstile-response"]')?.value || '';
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, turnstile: token })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/dashboard.html?user=' + encodeURIComponent(username);
        } else {
          err.textContent = data.message || 'Invalid username or password.';
          err.style.display = 'block';
          btn.textContent = 'Enter the Stage';
          form.classList.remove('loading');
          if (window.turnstile) turnstile.reset();
        }
      } catch (ex) {
        err.textContent = 'Connection error. Please try again.';
        err.style.display = 'block';
        btn.textContent = 'Enter the Stage';
        form.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
